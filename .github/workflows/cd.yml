name: CD

on:
  push:
    branches: [main]

jobs:
  publish-nuget:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0

      - name: Restore
        run: dotnet restore src/TransportPlatform.Infrastructure.sln

      - name: Build
        run: dotnet build src/TransportPlatform.Infrastructure.sln --no-restore --configuration Release

      # Pack both NuGet packages
      - name: Pack TransportPlatform.Contracts
        run: |
          dotnet pack src/TransportPlatform.Contracts/TransportPlatform.Contracts.csproj \
            --no-build \
            --configuration Release \
            --output ./nupkg

      - name: Pack TransportPlatform.Infrastructure.Common
        run: |
          dotnet pack src/TransportPlatform.Infrastructure.Common/TransportPlatform.Infrastructure.Common.csproj \
            --no-build \
            --configuration Release \
            --output ./nupkg

      # Push to BaGet (on-premise NuGet server)
      - name: Push to BaGet
        run: |
          cat > /tmp/baget.config << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <add key="LocalBaGet" value="http://host.docker.internal:5555/v3/index.json" allowInsecureConnections="true" />
            </packageSources>
          </configuration>
          EOF
          dotnet nuget push ./nupkg/*.nupkg \
            --source http://host.docker.internal:5555/v3/index.json \
            --api-key your-secret-key \
            --skip-duplicate \
            --configfile /tmp/baget.config
